<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUTTERFLY 16 MD - Pairing</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Poppins', Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 350px;
      padding: 30px 20px;
      position: relative;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
      position: relative;
      transition: transform 0.3s;
    }

    .box:hover {
      transform: scale(1.02);
      box-shadow: 0 0 40px #ff00ff, 0 0 20px #00ffff;
    }

    #text {
      color: #fff;

    }

    h3 {
      font-size: 1.8rem;
      margin: 0 0 10px;
      background: linear-gradient(45deg, #f3ec78, #af4261);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .centered-text {
      text-align: center;
    }

    h6 {
      font-size: 1rem;
      margin: 5px 0;
      color: #ddd;
    }

    .input-container {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50px;
      padding: 5px;
      margin: 20px 0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-container input {
      flex: 1;
      padding: 15px 20px;
      border: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
      outline: none;
      border-radius: 50px 0 0 50px;
    }

    .input-container input::placeholder {
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
    }

    .input-container button {
      padding: 15px 25px;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      border: none;
      color: white;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 0 50px 50px 0;
      cursor: pointer;
      transition: 0.3s;
      border-left: 1px solid rgba(255, 255, 255, 0.2);
    }

    .input-container button:hover {
      background: linear-gradient(135deg, #3a7bd5, #00d2ff);
      box-shadow: 0 0 15px #00d2ff;
    }

    @media (max-width: 500px) {
      .box {
        width: 90%;
        padding: 20px;
      }
      .input-container {
        flex-direction: column;
        border-radius: 30px;
      }
      .input-container input {
        border-radius: 30px 30px 0 0;
        text-align: center;
      }
      .input-container button {
        border-radius: 0 0 30px 30px;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
      }
    }

    #pair {
      margin-top: 20px;
      font-size: 1.2rem;
    }

    #pair font {
      cursor: pointer;
      transition: 0.2s;
    }

    #pair font:hover {
      opacity: 0.8;
    }

    .footer {
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="main">
      <div class="box" id="box">
        <div id="text">
          <i class="fas fa-butterfly" style="font-size: 3rem; color: #ff99cc;"></i>
          <h3>BUTTERFLY 16 MD</h3>
          <h6>Made by MEC IDÉAL x HIRO</h6>
          <h6>Enter your number with country code</h6>
          <div class="input-container">
            <input placeholder="243xxxxxxxxxxxx" type="tel" id="number" name="number">
            <button id="submit">Submit</button>
          </div>
          <div id="waiting-message" style="display: none; color: #ffd700;">Please wait a while...</div>
          <div id="pair"></div>
          <div class="footer">✨ Connect your WhatsApp easily ✨</div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>
  <script>
    const pairDiv = document.getElementById("pair");
    const submitBtn = document.getElementById("submit");
    const numberInput = document.getElementById("number");
    const waitingMsg = document.getElementById("waiting-message");

    async function copyCode() {
      const codeElement = document.getElementById("copy");
      const fullText = codeElement.innerText;
      const code = fullText.replace('CODE: ', '').trim();
      try {
        await navigator.clipboard.writeText(code);
        codeElement.innerText = "COPIED!";
        codeElement.style.color = "#00ff00";
        setTimeout(() => {
          codeElement.innerText = fullText;
          codeElement.style.color = "#ff5555";
        }, 2000);
      } catch (err) {
        alert("Impossible de copier, sélectionne le code manuellement.");
      }
    }

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      const rawNumber = numberInput.value.replace(/\D/g, "");
      if (!rawNumber) {
        pairDiv.innerHTML = '<span style="color: #ff9999;">⚠️ Enter your WhatsApp number</span>';
      } else if (rawNumber.length < 10) {
        pairDiv.innerHTML = '<span style="color: #ff9999;">⚠️ Invalid number (too short)</span>';
      } else {
        // Afficher un joli format dans l'input
        numberInput.value = '+' + rawNumber.replace(/(\d{3})(\d{3,})/, '$1 $2');
        waitingMsg.style.display = "block";
        pairDiv.innerHTML = '<span style="color: #aaa;">⏳ Requesting code...</span>';
        try {
          const { data } = await axios(`/code?number=${rawNumber}`);
          const code = data.code || "Service unavailable";
          waitingMsg.style.display = "none";
          pairDiv.innerHTML = `<font id="copy" onclick="copyCode()" style="color: #ff5555; font-weight: bold; cursor: pointer;">CODE: <span style="color: white;">${code}</span></font><br><span style="font-size:0.8rem; color:#aaa;">Clique pour copier</span>`;
        } catch (error) {
          waitingMsg.style.display = "none";
          pairDiv.innerHTML = '<span style="color: #ff5555;">❌ Server error, try again later.</span>';
        }
      }
    });
  </script>
</body>
      </html>
